<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Erik Van Nguyen — Stills, Sound & Motion</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0a0a0c;font-family:'DM Sans',sans-serif;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
a{text-decoration:none;color:rgba(255,255,255,0.6);transition:color 0.2s}a:hover{color:#fff}

.hero{position:relative;height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 72px}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(0.4);transform:scale(1.05);will-change:transform}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,#0a0a0c 0%,rgba(10,10,12,0.3) 40%,rgba(10,10,12,0.15) 100%)}
.nav{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:28px 48px;z-index:10;opacity:0;animation:fadeIn 0.8s ease 0.2s forwards}
.nav-name{font-family:'EB Garamond',serif;font-size:20px;font-weight:700}
.nav-links{display:flex;gap:32px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase}
.hero-text{position:relative;z-index:2}
.hero-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:16px;opacity:0;animation:fadeUp 0.8s ease 0.4s forwards}
.hero-title{font-family:'EB Garamond',serif;font-size:clamp(48px,8vw,96px);font-weight:400;line-height:1;opacity:0;animation:fadeUp 0.8s ease 0.6s forwards}
.hero-title em{font-style:italic}
.scroll-cue{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px}
.scroll-cue span{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.3)}
.scroll-line{width:1px;height:32px;background:linear-gradient(to bottom,rgba(255,255,255,0.3),transparent);animation:pulse 2s ease-in-out infinite}

.transition-zone{position:relative;height:20vh;display:flex;align-items:center;justify-content:center}
.transition-zone p{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.1)}

.fan-section{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;perspective-origin:50% 50%;padding:60px 0;overflow:visible}
.fan-container{position:relative;width:100%;max-width:1200px;height:520px;transform-style:preserve-3d}
.fan-card{position:absolute;left:50%;top:50%;border-radius:12px;overflow:hidden;transform-style:preserve-3d;cursor:pointer;backface-visibility:hidden}
.fan-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.fan-card:hover img{transform:scale(1.06)}
.fan-card .overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 14px 14px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);opacity:0;transition:opacity 0.3s;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase}
.fan-card:hover .overlay{opacity:1}

.contact{padding:120px 48px;max-width:600px;margin:0 auto;text-align:center}
.contact .label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px}
.contact h2{font-family:'EB Garamond',serif;font-size:36px;font-weight:400;font-style:italic;margin:0 0 24px}
.contact .email{font-family:'DM Mono',monospace;font-size:14px;color:#fff;border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:2px}
.contact .links{margin-top:16px;display:flex;justify-content:center;gap:24px}
.contact .links a{font-size:12px;color:rgba(255,255,255,0.5)}
footer{padding:24px 48px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.2)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}

@media(max-width:600px){
  .hero{padding:0 24px 48px}.nav{padding:20px 24px}
  .fan-container{height:400px}
  .contact{padding:80px 24px}
  footer{padding:16px 24px;flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg" id="heroBg" style="background-image:url(https://res.cloudinary.com/dy5pwpsoi/image/upload/f_auto,q_auto,w_1200/hero_xwbj9f.jpg)"></div>
  <div class="hero-grad"></div>
  <nav class="nav">
    <span class="nav-name">Erik Van Nguyen</span>
    <div class="nav-links"><a href="#work">Work</a><a href="#contact">Contact</a></div>
  </nav>
  <div class="hero-text" id="heroText">
    <p class="hero-label">Stills, Sound & Motion</p>
    <h1 class="hero-title">Capturing<br><em>the unseen</em></h1>
  </div>
  <div class="scroll-cue" id="scrollCue">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</section>

<div class="transition-zone"><p>Selected Work</p></div>

<section class="fan-section" id="work">
  <div class="fan-container" id="fanContainer"></div>
</section>

<div style="height:40vh"></div>

<section class="contact" id="contact">
  <p class="label">Get in touch</p>
  <h2>Let's create together</h2>
  <a href="mailto:erik@cmngrdn.com" class="email">erik@cmngrdn.com</a>
  <div class="links">
    <a href="https://instagram.com/thebadnights" target="_blank" rel="noopener noreferrer">Instagram</a>
    <a href="https://vimeo.com/1171375775" target="_blank" rel="noopener noreferrer">Vimeo</a>
  </div>
</section>
<footer><span>&copy; 2026 Erik Van Nguyen</span><span>Stills, Sound & Motion</span></footer>

<script>
const C="https://res.cloudinary.com/dy5pwpsoi/image/upload/f_auto,q_auto,w_800";
const photos=[
  {s:"/2_imyao0.jpg",t:"Ghost Signal"},{s:"/3_orgiq9.jpg",t:"Still Burning"},
  {s:"/5_hpr4vn.jpg",t:"Neon Psalm"},{s:"/7_ngy5bh.jpg",t:"Midnight Legend"},
  {s:"/9_sj4iuy.jpg",t:"Phantom Grain"},{s:"/11_z7m3mz.jpg",t:"Low Tide"},
  {s:"/14_onb3by.jpg",t:"Last Frame"},{s:"/4_boeiu5.jpg",t:"After Hours"},
  {s:"/6_novhyu.jpg",t:"Drift"},{s:"/8_fpfdph.jpg",t:"Ember Glow"},
  {s:"/10_wbujwt.jpg",t:"Iron Sky"},{s:"/12_q9oxzv.jpg",t:"Half Light"},
  {s:"/15_x7ut9k.jpg",t:"Silver Lining"},{s:"/1_nfjpd4.jpg",t:"First Light"},
];

const fc=document.getElementById('fanContainer');
const cardW=window.innerWidth<600?120:200;

photos.forEach((p,i)=>{
  const d=document.createElement('div');
  d.className='fan-card';
  d.style.width=cardW+'px';
  d.style.aspectRatio='3/4';
  d.innerHTML='<img src="'+C+p.s+'" alt="'+p.t+'" loading="lazy"><div class="overlay">'+p.t+'</div>';
  fc.appendChild(d);
});

const cards=document.querySelectorAll('.fan-card');
const heroBg=document.getElementById('heroBg');
const heroText=document.getElementById('heroText');
const scrollCue=document.getElementById('scrollCue');
const fanSection=document.getElementById('work');
const total=cards.length;
const center=(total-1)/2;

function easeOut(t){return 1-Math.pow(1-t,3)}

function update(){
  const sy=window.scrollY;
  const vh=window.innerHeight;
  const heroOp=Math.max(1-sy/500,0);

  // Hero parallax
  heroBg.style.transform='translateY('+sy*0.4+'px) scale(1.05)';
  heroText.style.opacity=heroOp;
  scrollCue.style.opacity=heroOp*0.5;

  // Fan progress
  const fanRect=fanSection.getBoundingClientRect();
  const rawProgress=(vh-fanRect.top)/(vh*0.8);
  const fp=Math.max(0,Math.min(1,rawProgress));
  const p=easeOut(fp);

  cards.forEach((card,i)=>{
    const offset=i-center;
    const absOff=Math.abs(offset);

    // Fan spread
    const angle=offset*9*p;
    const x=offset*(75*p);
    const z=-absOff*(35*p);
    const stackZ=-i*3*(1-p);

    // Slight vertical wave
    const wave=Math.sin((i/total)*Math.PI)*15*p;

    card.style.transform=
      'translateX(calc(-50% + '+x+'px)) '+
      'translateY(calc(-50% + '+(-wave)+'px)) '+
      'translateZ('+(z+stackZ)+'px) '+
      'rotateY('+angle+'deg)';

    card.style.boxShadow='0 '+(8+absOff*3)+'px '+(25+absOff*8)+'px rgba(0,0,0,'+(0.3+p*0.4)+')';
    card.style.zIndex=total-Math.round(absOff);

    // Fade in cards as they fan
    card.style.opacity=0.3+p*0.7;
  });

  requestAnimationFrame(update);
}

requestAnimationFrame(update);
</script>
</body>
</html>
